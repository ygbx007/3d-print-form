<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D打印预约 - 郑州信息学奥赛俱乐部</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 24px; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-group label .required { color: #ff4d4f; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: #fff;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group input::placeholder { color: #aaa; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        .success-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .success-message .icon {
            width: 80px; height: 80px;
            background: #52c41a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .success-message .icon svg { width: 40px; height: 40px; stroke: white; }
        .success-message h2 { color: #333; font-size: 20px; margin-bottom: 8px; }
        .success-message p { color: #666; font-size: 14px; }
        .error-message {
            display: none;
            background: #fff2f0;
            border: 1px solid #ffccc7;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            color: #ff4d4f;
            font-size: 14px;
        }
        .tips {
            margin-top: 20px;
            padding: 16px;
            background: #f6f8ff;
            border-radius: 10px;
            font-size: 13px;
            color: #666;
        }
        .tips h4 { color: #333; margin-bottom: 8px; font-size: 14px; }
        .tips ul { margin-left: 20px; }
        .tips li { margin-bottom: 4px; }
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .club-name { font-size: 12px; color: #999; text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 3D打印预约</h1>
            <p>郑州信息学奥赛俱乐部</p>
        </div>
        <div class="form-card">
            <form id="reservationForm">
                <div class="error-message" id="errorMessage"></div>
                <div class="form-group">
                    <label>预约人姓名 <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="请输入孩子姓名" required>
                </div>
                <div class="form-group">
                    <label>模型名称 <span class="required">*</span></label>
                    <input type="text" id="modelName" name="modelName" placeholder="如：威龙、刀盾、大师球" required>
                </div>
                <div class="form-group">
                    <label>模型颜色/参数</label>
                    <input type="text" id="modelParams" name="modelParams" placeholder="如：深蓝、紫色、8币">
                </div>
                <div class="form-group">
                    <label>积分币数量 <span class="required">*</span></label>
                    <input type="number" id="coins" name="coins" placeholder="需要消耗的积分币数量" min="1" required>
                </div>
                <div class="form-group">
                    <label>制作者（老师）</label>
                    <input type="text" id="maker" name="maker" placeholder="如：刘师匠、丹雅绘">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="note" name="note" placeholder="如：是否已支付积分币">
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">提交预约</button>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>提交中...</p>
                </div>
            </form>
            <div class="success-message" id="successMessage">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="3">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h2>预约成功！</h2>
                <p>老师会在打印完成后联系你取件～</p>
                <p style="margin-top: 12px; font-size: 12px; color: #999;">页面可关闭</p>
            </div>
            <div class="tips">
                <h4>📌 温馨提示</h4>
                <ul>
                    <li>预约后，老师会按顺序安排打印</li>
                    <li>同款模型多人预约，可批量打印更省材料</li>
                    <li>如有疑问请联系前台老师</li>
                </ul>
            </div>
            <p class="club-name">郑州信息学奥赛俱乐部 · 科技创新教育</p>
        </div>
    </div>
    <script>
        const form = document.getElementById('reservationForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');

        const WEBHOOK_URL = "https://threed-print-server-fzmt.onrender.com";

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = {
                name: document.getElementById('name').value.trim(),
                modelName: document.getElementById('modelName').value.trim(),
                modelParams: document.getElementById('modelParams').value.trim(),
                coins: parseInt(document.getElementById('coins').value),
                maker: document.getElementById('maker').value.trim(),
                note: document.getElementById('note').value.trim(),
                submitTime: new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })
            };
            if (!formData.name || !formData.modelName || !formData.coins) {
                showError('请填写必填项');
                return;
            }
            submitBtn.style.display = 'none';
            loading.style.display = 'block';
            errorMessage.style.display = 'none';
            try {
                if (WEBHOOK_URL) {
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                }
                form.style.display = 'none';
                successMessage.style.display = 'block';
            } catch (error) {
                console.error('提交失败:', error);
                showError('提交失败，请稍后重试或联系老师');
                submitBtn.style.display = 'block';
                loading.style.display = 'none';
            }
        });
        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.style.display = 'block';
        }
    </script>
</body>
</html>
